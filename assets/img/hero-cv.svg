<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff" />
      <stop offset="100%" stop-color="#dbeafe" />
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8fafc" />
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="8" stdDeviation="8" flood-color="#1e3a8a" flood-opacity="0.1" />
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
  </defs>

  <!-- Background decorative circle -->
  <circle cx="250" cy="250" r="220" fill="url(#bgGrad)" opacity="0.6" />
  <circle cx="400" cy="120" r="60" fill="#93c5fd" opacity="0.3" filter="blur(10px)" />
  <circle cx="100" cy="380" r="80" fill="#bfdbfe" opacity="0.4" filter="blur(15px)" />

  <!-- Main CV Document mockup -->
  <g filter="url(#softShadow)">
    <rect x="120" y="60" width="260" height="360" rx="16" fill="url(#cardGrad)" />
    
    <!-- CV Header Color Band -->
    <path d="M 120 76 A 16 16 0 0 1 136 60 L 364 60 A 16 16 0 0 1 380 76 L 380 120 L 120 120 Z" fill="url(#primaryGrad)" />
    
    <!-- Photo placeholder on CV -->
    <rect x="145" y="80" width="55" height="55" rx="27.5" fill="#ffffff" filter="url(#dropShadow)" />
    <circle cx="172.5" cy="102" r="14" fill="#cbd5e1" />
    <path d="M 152 130 C 152 118, 193 118, 193 130 Z" fill="#cbd5e1" />

    <!-- Name and Title on CV -->
    <rect x="215" y="85" width="120" height="12" rx="6" fill="#ffffff" />
    <rect x="215" y="105" width="80" height="8" rx="4" fill="#93c5fd" />

    <!-- Left Column (Contact & Skills) -->
    <!-- Contact Info Mock -->
    <rect x="145" y="160" width="70" height="6" rx="3" fill="#cbd5e1" />
    <rect x="145" y="175" width="55" height="6" rx="3" fill="#cbd5e1" />
    <rect x="145" y="190" width="60" height="6" rx="3" fill="#cbd5e1" />

    <!-- Skills Header -->
    <rect x="145" y="220" width="50" height="8" rx="4" fill="#94a3b8" />
    <!-- Skills Dots -->
    <rect x="145" y="238" width="65" height="6" rx="3" fill="#e2e8f0" />
    <rect x="145" y="248" width="55" height="6" rx="3" fill="#e2e8f0" />
    <rect x="145" y="258" width="60" height="6" rx="3" fill="#e2e8f0" />

    <!-- Languages Header -->
    <rect x="145" y="285" width="50" height="8" rx="4" fill="#94a3b8" />
    <rect x="145" y="303" width="60" height="6" rx="3" fill="#e2e8f0" />
    <rect x="145" y="313" width="45" height="6" rx="3" fill="#e2e8f0" />

    <!-- Divider Line -->
    <line x1="230" y1="150" x2="230" y2="380" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="3 3" />

    <!-- Right Column (Experience & Education) -->
    <!-- Profile Summary -->
    <rect x="245" y="160" width="115" height="6" rx="3" fill="#64748b" />
    <rect x="245" y="172" width="105" height="6" rx="3" fill="#94a3b8" />
    
    <!-- Experience Header -->
    <rect x="245" y="195" width="70" height="8" rx="4" fill="url(#primaryGrad)" />
    
    <!-- Experience Item 1 -->
    <circle cx="248" cy="220" r="3" fill="#2563eb" />
    <rect x="256" y="216" width="90" height="8" rx="4" fill="#475569" />
    <rect x="256" y="228" width="60" height="6" rx="3" fill="#94a3b8" />
    <rect x="256" y="238" width="100" height="5" rx="2.5" fill="#cbd5e1" />
    <rect x="256" y="247" width="95" height="5" rx="2.5" fill="#cbd5e1" />

    <!-- Experience Item 2 -->
    <circle cx="248" cy="270" r="3" fill="#2563eb" />
    <rect x="256" y="266" width="85" height="8" rx="4" fill="#475569" />
    <rect x="256" y="278" width="55" height="6" rx="3" fill="#94a3b8" />
    <rect x="256" y="288" width="100" height="5" rx="2.5" fill="#cbd5e1" />
    <rect x="256" y="297" width="80" height="5" rx="2.5" fill="#cbd5e1" />

    <!-- Education Header -->
    <rect x="245" y="320" width="70" height="8" rx="4" fill="url(#primaryGrad)" />
    <!-- Education Item 1 -->
    <circle cx="248" cy="345" r="3" fill="#2563eb" />
    <rect x="256" y="341" width="90" height="8" rx="4" fill="#475569" />
    <rect x="256" y="353" width="65" height="6" rx="3" fill="#cbd5e1" />
  </g>

  <!-- Overlay graphics: Floating stats/badge for visual depth -->
  <g filter="url(#dropShadow)" transform="translate(310, 270)">
    <rect x="0" y="0" width="100" height="46" rx="10" fill="#ffffff" />
    <!-- Star ratings / Checkmark -->
    <circle cx="24" cy="23" r="14" fill="#dcfce7" />
    <path d="M 18 23 L 22 27 L 30 19" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="46" y="14" width="44" height="7" rx="3.5" fill="#16a34a" />
    <rect x="46" y="26" width="30" height="5" rx="2.5" fill="#a7f3d0" />
  </g>

  <!-- Floating color palette bubble -->
  <g filter="url(#dropShadow)" transform="translate(60, 180)">
    <rect x="0" y="0" width="46" height="120" rx="23" fill="#ffffff" />
    <circle cx="23" cy="25" r="13" fill="#2563eb" />
    <circle cx="23" cy="55" r="13" fill="#059669" />
    <circle cx="23" cy="85" r="13" fill="#dc2626" />
  </g>

  <!-- Floating gear icon (customization indicator) -->
  <g filter="url(#dropShadow)" transform="translate(320, 80)">
    <circle cx="20" cy="20" r="20" fill="url(#accentGrad)" />
    <!-- Gear representation -->
    <circle cx="20" cy="20" r="8" fill="none" stroke="#ffffff" stroke-width="3" />
    <!-- Teeth -->
    <line x1="20" y1="6" x2="20" y2="10" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    <line x1="20" y1="30" x2="20" y2="34" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    <line x1="6" y1="20" x2="10" y2="20" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    <line x1="30" y1="20" x2="34" y2="20" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    <line x1="10.1" y1="10.1" x2="12.9" y2="12.9" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    <line x1="27.1" y1="27.1" x2="29.9" y2="29.9" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    <line x1="10.1" y1="29.9" x2="12.9" y2="27.1" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    <line x1="27.1" y1="12.9" x2="29.9" y2="10.1" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
  </g>
</svg>
